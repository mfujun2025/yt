<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>樱桃电视</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: "Microsoft Yahei", Arial, sans-serif; overflow: hidden; }
        /* 隐藏 AppMySite 自带的导航栏 */
        .ams-bottom-bar, .ams-header { display: none !important; }
        /* 开机启动页 */
        #splash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        #splash img { width: 100%; height: 100%; object-fit: cover; }
        #skip {
            position: absolute; top: 20px; right: 30px; color: #fff; font-size: 32px;
            background: rgba(0, 0, 0, 0.5); padding: 8px 16px; border-radius: 4px;
            cursor: pointer; z-index: 10000;
        }
        /* 直播播放器容器 */
        #player {
            width: 100vw; height: 100vh; display: none;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <!-- 开机广告页 -->
    <div id="splash">
        <img src="https://picui.ogmua.cn/s1/2026/03/28/69c749118be38.webp" alt="开机广告">
        <div id="skip">跳过2秒</div>
    </div>
    <!-- 直播播放器 -->
    <div id="player">
        <iframe src="https://www.262m.com" allowfullscreen></iframe>
    </div>

    <script>
        let countdown = 2;
        const skipEl = document.getElementById('skip');
        const splashEl = document.getElementById('splash');
        const playerEl = document.getElementById('player');

        // 倒计时逻辑
        const timer = setInterval(() => {
            countdown--;
            skipEl.textContent = `跳过${countdown}秒`;
            if (countdown <= 0) {
                goToPlayer();
            }
        }, 1000);

        // 点击跳过按钮
        skipEl.addEventListener('click', goToPlayer);

        function goToPlayer() {
            clearInterval(timer);
            splashEl.style.display = 'none';
            playerEl.style.display = 'block';
            // 额外强制全屏
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }

        // 额外监听页面加载完成后确保跳转
        window.addEventListener('load', () => {
            setTimeout(goToPlayer, 2000);
        });
    </script>
</body>
</html>
